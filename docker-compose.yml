version: '3.8'

services:
  db:
    image: postgres:15
    container_name: alerta_vagas_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: sua_senha_segura
      POSTGRES_DB: vagas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: